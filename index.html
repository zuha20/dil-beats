<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <img src="covers/profile.avif" alt="Profile" class="profile-pic" onerror="this.src='covers/placeholder.jpg'" />
    <span class="site-header-name">Dil Beats</span>
  </header>

  <div class="app">

    <!-- Left: Now Playing panel -->
    <section class="now-playing">
      <p class="eyebrow">Currently Playing</p>

      <div class="art-wrap" id="artWrap">
        <img id="art" class="cover" src="covers/placeholder.jpg" alt="Album art" style="display:none;" />
        <div class="art-empty-state" id="artEmptyState">
          <img src="covers/profile.avif" alt="Dil Beats logo" class="empty-state-logo" onerror="this.style.display='none'" />
          <p>Pick a mood, then tap a song</p>
        </div>
      </div>

      <h1 id="np-title" class="np-title">Select a track</h1>
      <p id="np-artist" class="np-artist">—</p>

      <!-- Signature waveform scrubber -->
      <div class="scrubber" id="scrubber">
        <svg id="waveform" class="waveform" viewBox="0 0 600 60" preserveAspectRatio="none"></svg>
        <div class="progress-mask" id="progressMask"></div>
        <div class="playhead" id="playhead"></div>
      </div>

      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <button id="shuffleBtn" class="ctrl-btn ghost" title="Shuffle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h3.5c1 0 1.8.5 2.4 1.3L15 17.7c.6.8 1.4 1.3 2.4 1.3H21M16 4l5 4-5 4M3 18h3.5c1 0 1.8-.5 2.4-1.3l1-1.4M16 20l5-4-5-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button id="prevBtn" class="ctrl-btn" title="Previous">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6V5zm3.5 7L18 5v14l-8.5-7z"/></svg>
        </button>

        <button id="playBtn" class="ctrl-btn primary" title="Play/Pause">
          <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>
        </button>

        <button id="nextBtn" class="ctrl-btn" title="Next">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 5h2v14h-2V5zM6 5l8.5 7L6 19V5z"/></svg>
        </button>

        <button id="repeatBtn" class="ctrl-btn ghost" title="Repeat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="vol-icon"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </section>

    <!-- Right: Playlist -->
    <section class="playlist-panel">
      <header class="playlist-header">
        <p class="eyebrow">My Playlist</p>
        <h2>Pick a Mood</h2>

        <div class="mood-pills" id="moodPills">
          <!-- Pills injected by JS -->
        </div>

        <input type="text" id="searchInput" class="search" placeholder="Search tracks or artists…" />
      </header>

      <div id="categorySections">
        <!-- Category sections injected by JS -->
      </div>
    </section>

  </div>

  <footer class="site-footer">
    <p>Made with care by Zuha · A personal playlist project</p>
     
  </footer>

  <audio id="audio" preload="metadata"></audio>

  <script src="songs.js"></script>
  <script src="script.js"></script>
</body>
</html>
